# =============================================================================
# GlazeWM — modifier grammar
# -----------------------------------------------------------------------------
#   alt              + h/j/k/l   focus window in direction
#   alt + shift      + h/j/k/l   move window in direction
#   alt + ctrl       + h/j/k/l   resize focused window
#   alt + ctrl+shift + h/j/k/l   move whole workspace to monitor in direction
#   alt              + 1..9      focus workspace N
#   alt + shift      + 1..9      send focused window to workspace N (and follow)
# =============================================================================

general:
  # Commands to run when the WM starts (e.g. launch a bar or script).
  startup_commands: []
  focus_follows_cursor: false
  toggle_workspace_on_refocus: false
  cursor_jump:
    enabled: true
    # 'window_focus': warp cursor on any focus change. 'monitor_focus': only
    # when focus crosses monitors.
    trigger: "window_focus"

gaps:
  inner_gap: "10px"
  outer_gap:
    top: "5px"
    right: "5px"
    bottom: "5px"
    left: "5px"

window_effects:
  # Border effects are Windows 11 only (API limitation).
  focused_window:
    border:
      enabled: true
      color: "#bea3c7"
  other_windows:
    border:
      enabled: true
      color: "#a1a1a1"

window_behavior:
  # New windows: 'tiling' or 'floating'.
  initial_state: "tiling"
  state_defaults:
    floating:
      centered: true
      shown_on_top: false
    fullscreen:
      # Maximize if the window supports it, else true fullscreen.
      maximized: false
      shown_on_top: false

workspaces:
  - name: "1"
  - name: "2"
  - name: "3"
  - name: "4"
  - name: "5"
  - name: "6"
  - name: "7"
  - name: "8"
  - name: "9"

window_rules:
  # Leave these unmanaged (never tiled).
  - commands: ["ignore"]
    match:
      # Browser picture-in-picture popups.
      - window_title: { regex: "[Pp]icture.in.[Pp]icture" }
        window_class: { regex: "Chrome_WidgetWin_1|MozillaDialogClass" }
      # Windows 11 Command Palette.
      - window_title: { equals: "Command Palette" }
        window_class: { equals: "WinUIDesktopWin32WindowClass" }
      # Lively Wallpaper render surfaces.
      - window_process: { equals: "Lively" }
        window_class: { regex: "HwndWrapper*" }
      # WezTerm (leave unmanaged/floating).
      - window_process: { equals: "wezterm-gui" }

binding_modes:
  # alt+r → resize with h/j/k/l or arrows; enter/escape exits.
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]
  # alt+shift+p → disable all binds (e.g. fullscreen games); alt+shift+p exits.
  - name: "pause"
    keybindings:
      - commands: ["wm-disable-binding-mode --name pause"]
        bindings: ["alt+shift+p"]

keybindings:
  # ---------------------------------------------------------------------------
  # Focus window            alt + h/j/k/l
  # ---------------------------------------------------------------------------
  - commands: ["focus --direction left"]
    bindings: ["alt+h", "alt+left"]
  - commands: ["focus --direction down"]
    bindings: ["alt+j", "alt+down"]
  - commands: ["focus --direction up"]
    bindings: ["alt+k", "alt+up"]
  - commands: ["focus --direction right"]
    bindings: ["alt+l", "alt+right"]

  # ---------------------------------------------------------------------------
  # Move window             alt + shift + h/j/k/l
  # ---------------------------------------------------------------------------
  - commands: ["move --direction left"]
    bindings: ["alt+shift+h", "alt+shift+left"]
  - commands: ["move --direction down"]
    bindings: ["alt+shift+j", "alt+shift+down"]
  - commands: ["move --direction up"]
    bindings: ["alt+shift+k", "alt+shift+up"]
  - commands: ["move --direction right"]
    bindings: ["alt+shift+l", "alt+shift+right"]

  # ---------------------------------------------------------------------------
  # Resize window           alt + ctrl + h/j/k/l   (mirrors resize mode)
  # ---------------------------------------------------------------------------
  - commands: ["resize --width -2%"]
    bindings: ["alt+ctrl+h"]
  - commands: ["resize --width +2%"]
    bindings: ["alt+ctrl+l"]
  - commands: ["resize --height +2%"]
    bindings: ["alt+ctrl+k"]
  - commands: ["resize --height -2%"]
    bindings: ["alt+ctrl+j"]

  # ---------------------------------------------------------------------------
  # Move workspace → monitor  alt + ctrl + shift + h/j/k/l
  # ---------------------------------------------------------------------------
  - commands: ["move-workspace --direction left"]
    bindings: ["alt+ctrl+shift+h"]
  - commands: ["move-workspace --direction down"]
    bindings: ["alt+ctrl+shift+j"]
  - commands: ["move-workspace --direction up"]
    bindings: ["alt+ctrl+shift+k"]
  - commands: ["move-workspace --direction right"]
    bindings: ["alt+ctrl+shift+l"]

  # ---------------------------------------------------------------------------
  # Binding modes
  # ---------------------------------------------------------------------------
  - commands: ["wm-enable-binding-mode --name resize"]
    bindings: ["alt+r"]
  - commands: ["wm-enable-binding-mode --name pause"]
    bindings: ["alt+shift+p"]

  # ---------------------------------------------------------------------------
  # Layout & window state
  # ---------------------------------------------------------------------------
  # macOS only: chains a synthesized Cmd+N with the direction change so a
  # single key both opens a new window and sets where it lands (see
  # new-window.sh). shell-exec runs first because set-tiling-direction can
  # detach the subject container (GlazeWM silently drops any commands
  # chained after it in that case).
  - commands: ["set-tiling-direction vertical"]
    bindings: ["alt+v"]
  - commands: ["set-tiling-direction horizontal"]
    bindings: ["alt+shift+v"]
  - commands: ["toggle-floating --centered"]
    bindings: ["alt+shift+space"]
  - commands: ["toggle-tiling"]
    bindings: ["alt+t"]
  - commands: ["toggle-fullscreen"]
    bindings: ["alt+f"]
  - commands: ["toggle-minimized"]
    bindings: ["alt+m"]
  - commands: ["close"]
    bindings: ["alt+shift+q"]

  # ---------------------------------------------------------------------------
  # WM control
  # ---------------------------------------------------------------------------
  - commands: ["wm-reload-config"]
    bindings: ["alt+shift+r"]
  - commands: ["wm-redraw"]
    bindings: ["alt+shift+w"]
  - commands: ["wm-exit"]
    bindings: ["alt+shift+e"]

  # ---------------------------------------------------------------------------
  # Launchers
  # ---------------------------------------------------------------------------
  - commands: ["shell-exec wezterm-gui"]    # WezTerm (matches this repo's term)
    bindings: ["alt+enter"]

  # ---------------------------------------------------------------------------
  # Focus workspace         alt + 1..9   (+ a/s/d cycling, non-directional)
  # ---------------------------------------------------------------------------
  - commands: ["focus --prev-workspace"]
    bindings: ["alt+a"]
  - commands: ["focus --next-workspace"]
    bindings: ["alt+s"]
  - commands: ["focus --recent-workspace"]
    bindings: ["alt+d"]
  - commands: ["focus --workspace 1"]
    bindings: ["alt+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["alt+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["alt+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["alt+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["alt+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["alt+6"]
  - commands: ["focus --workspace 7"]
    bindings: ["alt+7"]
  - commands: ["focus --workspace 8"]
    bindings: ["alt+8"]
  - commands: ["focus --workspace 9"]
    bindings: ["alt+9"]

  # ---------------------------------------------------------------------------
  # Send window → workspace   alt + shift + 1..9  (moves and follows)
  # ---------------------------------------------------------------------------
  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["alt+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["alt+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["alt+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["alt+shift+4"]
  - commands: ["move --workspace 5", "focus --workspace 5"]
    bindings: ["alt+shift+5"]
  - commands: ["move --workspace 6", "focus --workspace 6"]
    bindings: ["alt+shift+6"]
  - commands: ["move --workspace 7", "focus --workspace 7"]
    bindings: ["alt+shift+7"]
  - commands: ["move --workspace 8", "focus --workspace 8"]
    bindings: ["alt+shift+8"]
  - commands: ["move --workspace 9", "focus --workspace 9"]
    bindings: ["alt+shift+9"]
