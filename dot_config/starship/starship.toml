format = """
$os\
$username\
$hostname\
$kubernetes\
$directory\
$git_branch\
$git_status\
$fill\
$time\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$package\
$aws\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = 'nord'
command_timeout = 100

# Drop default prompt characters
[character]
success_symbol = ''
error_symbol = ''

# ---

[os]
format = '[$symbol](bold white) '   
disabled = false

[os.symbols]
Windows = 'оҳӘ'
Arch = 'у°ЈҮ'
Ubuntu = 'пҢӣ'
Macos = 'у°Җө'

# ---

# Time
[time]
disabled = false
format = "рҹ•’ [$time]($style) "
time_format = "%Y-%m-%d(%A) %I:%M %p"
style = "bold blue"

# Shows the username
[username]
style_user = 'white bold'
style_root = 'black bold'
format = '[$user]($style) '
disabled = false
show_always = true

# Shows the hostname
[hostname]
ssh_only = false
format = 'on [$hostname](bold yellow) '
disabled = false

# Shows current directory
[directory]
truncation_length = 1
truncation_symbol = 'вҖҰ/'
home_symbol = 'у°Ӣң ~'
read_only_style = '197'
read_only = ' пҖЈ '
format = 'at [$path]($style)[$read_only]($read_only_style) '

[directory.substitutions]
'Documents' = 'у°Ҳҷ'
'Downloads' = 'пҖҷ '
'Music' = 'пҖҒ '
'Pictures' = 'пҖҫ '

# Shows current git branch
[git_branch]
symbol = 'пҗҳ '
format = 'via [$symbol$branch]($style)'
# truncation_length = 4
truncation_symbol = 'вҖҰ/'
style = 'bold green'

# Shows current git status
[git_status]
format = '[$all_status$ahead_behind]($style) '
style = 'bold green'
conflicted = 'рҹҸі'
up_to_date = ''
untracked = 'п”© '
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
stashed = 'пЈ– '
modified = 'пҒ„ '
staged = '[++\($count\)](green)'
renamed = 'иҘҒ '
deleted = 'пҖ” '
disabled = true

# [git_status]
# format = '[$all_status]($style) '
# ahead = ''
# behind = ''
# diverged = ''

[fill]
symbol = ' '

# Shows kubernetes context and namespace
[kubernetes]
format = 'via [уұғҫ $context\($namespace\)](bold purple) '
disabled = true

# ---
[python]
style = 'teal'
symbol = 'оҲө '
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
disabled = true
symbol = 'оҳ  '

[nodejs]
disabled = true
style = 'blue'
symbol = 'оңҳ '

[golang]
disabled = true
style = 'blue'
symbol = 'оҳ§ '

[haskell]
disabled = true
style = 'blue'
symbol = 'оқ· '

[rust]
disabled = true
style = 'orange'
symbol = 'оһЁ '

[ruby]
disabled = true
style = 'blue'
symbol = 'оһ‘ '

[package]
disabled = true
symbol = 'у°Ҹ— '

[aws]
symbol = 'пү° '
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

[docker_context]
symbol = 'пҢҲ '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = 'пҖ“ '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

[helm]
disabled = true

[terraform]
disabled = true

[palettes.nord]
dark_blue = '#5E81AC'
blue = '#81A1C1'
teal = '#88C0D0'
red = '#BF616A'
orange = '#D08770'
green = '#A3BE8C'
yellow = '#EBCB8B'
purple = '#B48EAD'
gray = '#434C5E'
black = '#2E3440'
white='#D8DEE9'

[palettes.onedark]
dark_blue='#61afef'
blue='#56b6c2'
red='#e06c75'
green='#98c379'
purple='#c678dd'
cyan='#56b6c2'
orange='#be5046'
yellow='#e5c07b'
gray='#828997'
white ='#abb2bf'
black='#2c323c'


