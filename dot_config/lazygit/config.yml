disableStartupPopups: true

gui:
  nerdFontsVersion: "3"
  filterMode: "fuzzy"
  showRandomTip: false
  showCommandLog: false
  language: "en"
  showDivergenceFromBaseBranch: arrowAndNumber

git:
  overrideGpg: true
  parseEmoji: false
  localBranchSortOrder: recency
  autoForwardBranches: allBranches
  pagers:
    - colorArg: always
      pager: delta --paging=never

os:
  editPreset: nvim

customCommands:
  - key: "c"
    # yamllint disable-line rule:line-length
    command: >-
      git -c core.editor="vim" commit --edit -m "{{ .Form.Type }}{{if .Form.Scope}}({{ .Form.Scope }}){{end}}: "
    description: "conventional commit"
    context: "files"
    output: terminal
    prompts:
      - type: "menu"
        title: "Select the type of change you are committing."
        key: "Type"
        options:
          - name: "Feature"
            description: "A new feature"
            value: "feat"
          - name: "Fix"
            description: "A bug fix"
            value: "fix"
          - name: "Documentation"
            description: "Documentation only changes"
            value: "docs"
          - name: "Styles"
            description: "Styling changes (white-space, formatting, etc)"
            value: "style"
          - name: "Code Refactoring"
            description: "Refactoring code"
            value: "refactor"
          - name: "Performance Improvements"
            description: "Performance improvements"
            value: "perf"
          - name: "Tests"
            description: "Test additions or fixes"
            value: "test"
          - name: "Builds"
            description: "Build system or dependency changes"
            value: "build"
          - name: "Continuous Integration"
            description: "CI configuration changes"
            value: "ci"
          - name: "Chores"
            description: "Other non-code changes"
            value: "chore"
          - name: "Reverts"
            description: "Reverting changes"
            value: "revert"
      - type: "input"
        title: "Enter a scope (optional)."
        key: "Scope"

  - key: "U"
    context: "files"
    description: "amend all changes into last commit"
    command: "git add -A && git commit --amend --no-edit"
    prompts:
      - type: "confirm"
        title: "Amend all changes?"
        body: "Stage all changes and amend them into the last commit."

  - key: "T"
    context: "files"
    description: "WIP checkpoint commit and push"
    command: 'git add -A && git commit -m "WIP: checkpoint" --no-verify && git push'
    prompts:
      - type: "confirm"
        title: "Push WIP checkpoint?"
        body: "Stage all changes, commit as WIP (skips hooks via skipHookPrefix), and push immediately."

  - key: "D"
    context: "localBranches"
    description: "delete local branches merged into the default branch"
    command: "git branch --merged $(git symbolic-ref --short refs/remotes/origin/HEAD) | grep -v '^\\*' | xargs -r git branch -d"
    prompts:
      - type: "confirm"
        title: "Delete merged branches?"
        body: "Delete every local branch already merged into the repo's default branch (origin/HEAD)."

  - key: "w"
    context: "localBranches"
    description: "watch CI checks for this branch's PR"
    command: "gh pr checks --watch"
    output: terminal

  - key: "B"
    context: "localBranches"
    description: "create PR against a chosen base branch"
    prompts:
      - type: "menuFromCommand"
        title: "Select base branch"
        key: "Base"
        command: "git branch -r --list 'origin/*'"
        filter: "origin/(.*)"
        valueFormat: "{{ .group_1 }}"
        labelFormat: "{{ .group_1 | cyan }}"
    command: "gh pr create --web --base {{.Form.Base}}"
    output: popup

  - key: "u"
    context: "commits"
    description: "find PR containing this commit"
    command: >
      gh pr list --search "{{.SelectedCommit.Hash}}" --state all --json number,title,url
      --jq '.[] | "#\(.number) \(.title)\n\(.url)"'
    output: popup
