[[snippets]]
    command = "python ~/.config/pet/scripts/gh_pr_reviews.py <org=flywheel-jp> <repo=monorepo> <author=jack06215> <after=2026-01-01> <until=2026-05-31>"
    description = "GitHub: List PRs with reviews in a date range"
    tag = ["gh", "pr", "review"]
[[snippets]]
    # https://github.com/flywheel-jp/monorepo/pull/114699
    command = "aws --profile <profile=saml_flywheel_opal> ecr list-images --repository-name=<repository_name> --output json | jq -r '.imageIds[] | select(.imageTag)'"
    description = "AWS ECR: List of image tags"
    tag = ["aws", "ecr", "image tags"]
[[snippets]]
    # https://github.com/flywheel-jp/monorepo/pull/114699
    command = "aws --profile <profile=saml_flywheel_opal> ecr describe-repositories --output json | jq -r '.repositories[] | select(.repositoryName | test(\"<regex>\"))'"
    description = "AWS ECR: Find Repository"
    tag = ["aws", "ecr", "repository"]
[[snippets]]
    command = "AUTHZ_ACCESS_TOKEN=$AUTHZ_ACCESS_TOKEN python ~/.config/pet/flywheel/quor_get_user_groups.py <idp_id=auth0-> <project_id>"
