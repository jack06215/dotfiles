[[snippets]]
    description = "FW Monorepo: Find image tags"
    command = """bazel build //kubernetes/clusters/<cluster=opal-staging>/image_tags:image_tags_libsonnet && jsonnet \"$(bazel info bazel-bin 2>/dev/null)/kubernetes/clusters/<cluster=opal-staging>/image_tags/generated/image_tags.libsonnet\" | jq 'with_entries(select(.key | contains("<regex>")))'"""
    tag = ["bazel", "k8s", "image tag", "flywheel-jp"]
[[snippets]]
    # https://flywheel-jp.slack.com/archives/C074QT8EMPB/p1773141477017639
    description = "FW Monorepo: List all image tags"
    command = """bazel build //kubernetes/clusters/<cluster=opal-staging>/image_tags:image_tags_libsonnet && jsonnet \"$(bazel info bazel-bin 2>/dev/null)/kubernetes/clusters/<cluster=opal-staging>/image_tags/generated/image_tags.libsonnet\" | jq"""
    tag = ["bazel", "k8s", "image tag", "flywheel-jp"]
[[snippets]]
  description = "FW Monorepo: Filter workflows by path regex"
  command = "gh workflow list --json name,path,state --limit 300 | jq '[.[] | select(.path | test(\"<workflow_yml>\")) | . + {url: (\"https://github.com/flywheel-jp/monorepo/actions/workflows/\" + (.path | split(\"/\") | last))}]'"
  tag = ["gh", "workflow", "flywheel-jp"]
