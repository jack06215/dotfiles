[[snippets]]
    description = "FW Monorepo: Show image tag age in days"
    command = """bazel build //kubernetes/clusters/<cluster=opal-staging>/image_tags:image_tags_libsonnet && jsonnet "$(bazel info bazel-bin 2>/dev/null)/kubernetes/clusters/<cluster=opal-staging>/image_tags/generated/image_tags.libsonnet" | python3 -c "
import sys, json
from datetime import datetime, timezone, timedelta

min_days = int(sys.argv[1]) if len(sys.argv) > 1 else 0
JST = timezone(timedelta(hours=9))
now = datetime.now(JST)
data = json.load(sys.stdin)
result = {}
for repo, tags in data.items():
    filtered = {}
    for tag_name, tag_val in tags.items():
        try:
            dt = datetime.strptime(tag_val[:15], '%Y%m%d-%H%M%S').replace(tzinfo=JST)
            days = (now - dt).days
            if days >= min_days:
                filtered[tag_name] = '%s (%dd ago)' % (tag_val, days)
        except ValueError:
            if min_days == 0:
                filtered[tag_name] = '%s (unable to calculate)' % tag_val
    if filtered:
        result[repo] = filtered
print(json.dumps(result, indent=2, ensure_ascii=False))
" <min_days=0>
"""
    tag = ["bazel", "k8s", "image tag", "flywheel-jp"]
